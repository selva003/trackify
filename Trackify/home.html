<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Trackify</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav>
        <h2>Trackify</h2>
        <ul>
            <li><a href="home.html">Home</a></li>
            <li><a href="analyse.html">Analyse</a></li>
            <li><a href="#" id="logoutBtn">Logout</a></li>
        </ul>
    </nav>
    <div class="container">
        <h2>Your Habits</h2>

        <div class="add-habit-section">
            <h3>Add New Habit</h3>
            <form id="habitForm">
                <input type="hidden" id="habitId">
                <div class="form-group">
                    <label for="habitName">Habit Name:</label>
                    <input type="text" id="habitName" required>
                </div>
                <div class="form-group">
                    <label for="startDate">Start Date:</label>
                    <input type="date" id="startDate" required>
                </div>
                <div class="form-group">
                    <label for="endDate">End Date:</label>
                    <input type="date" id="endDate" required>
                </div>
                <button type="submit" id="saveHabitBtn">Add Habit</button>
                <button type="button" id="cancelEditBtn" style="display:none;">Cancel</button>
            </form>
        </div>

        <div class="habit-list-section">
            <h3>Habit List</h3>
            <ul id="habitList" class="habit-list">
                <!-- Habits will be loaded here -->
            </ul>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
